version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: carbon_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: carbon_footprint_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-securepassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d carbon_footprint_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - carbon_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runner
    container_name: carbon_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-securepassword}@postgres:5432/carbon_footprint_db?schema=public
      NODE_ENV: production
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - carbon_net
    security_opt:
      - no-new-privileges:true

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runner
    container_name: carbon_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - carbon_net
    security_opt:
      - no-new-privileges:true

volumes:
  postgres_data:
    driver: local

networks:
  carbon_net:
    driver: bridge
